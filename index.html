</head>
<body>
    <div class="custom-cursor"></div>
    <nav class="main_nav">
        <div class="main_nav_left">
            <img class="mainnav_profile_pic" src="favicon.png">
        </div>
        <div class="main_nav_right">
              <a href="index.html">Home</a>
             <a href="projects.html">My Projects</a>
        </div>

    <div class="index_main_cnt">
        <h1>Welcome to Praj's Hideout!</h1>
        <p>
          Hey there! I’m Prajwal Uppalapati and this is my personal website.
           Inside my hideout, you’ll find my projects, experiments, and creative builds.
           Explore, discover new ideas, and get inspired by the world I’m creating here. 
          </p>
    </div>

<script>

const cursor = document.querySelector('.custom-cursor');

document.addEventListener('mousemove', e => {

  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';

});


/* Cursor hover effect */
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.classList.add('hover');
  });

  el.addEventListener('mouseleave', () => {
    cursor.classList.remove('hover');
  });
});

/* Cursor click effect */
document.addEventListener('mousedown', () => {
  cursor.classList.add('click');
});

document.addEventListener('mouseup', () => {
  cursor.classList.remove('click');
});

</script>

</body>
</html>
